<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#4f46e5" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />
  <title>Diário Pet</title>
</head>
<body class="bg-light">
  <div class="container py-4">
    <header class="text-center mb-4">
      <h1 class="mb-2">Diário Pet</h1>
      <p class="text-muted">Registre momentos do seu pet</p>
    </header>

    <ul class="nav nav-tabs mb-4" id="main-tabs">
      <li class="nav-item">
        <button class="nav-link active" data-tab="diary">Diário</button>
      </li>
      <li class="nav-item">
        <button class="nav-link" data-tab="pets">Meus Pets</button>
      </li>
    </ul>

    <!-- Seção Diário -->
    <div id="section-diary">
      <section class="card shadow-sm mb-4">
        <div class="card-body">
          <h2 id="form-title" class="h4 mb-3">Novo registro</h2>

          <form id="entry-form">
            <input type="hidden" id="entry-id" />

            <div class="mb-3">
              <label for="title" class="form-label">Título</label>
              <input type="text" id="title" class="form-control" required />
            </div>

            <div class="mb-3">
              <label for="description" class="form-label">Descrição</label>
              <textarea id="description" rows="4" class="form-control" required></textarea>
            </div>

            <div class="mb-3">
              <label for="happenedAt" class="form-label">Data e hora</label>
              <input type="datetime-local" id="happenedAt" class="form-control" required />
            </div>

            <div class="d-flex gap-2 flex-wrap">
              <button type="submit" class="btn btn-primary">Salvar</button>
              <button type="button" id="cancel-edit" class="btn btn-secondary hidden">Cancelar edição</button>
            </div>
          </form>

          <p id="message" class="mt-3 mb-0"></p>
        </div>
      </section>

      <section class="card shadow-sm">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
            <h2 class="h4 mb-0">Registros</h2>
            <button id="reload-btn" class="btn btn-outline-secondary btn-auto">Atualizar</button>
          </div>

          <div id="entries-list"></div>
        </div>
      </section>
    </div>

    <!-- Seção Pets -->
    <div id="section-pets" class="hidden">
      <section class="card shadow-sm mb-4">
        <div class="card-body">
          <h2 id="pet-form-title" class="h4 mb-3">Novo pet</h2>

          <form id="pet-form">
            <input type="hidden" id="pet-id" />

            <div class="mb-3">
              <label for="pet-name" class="form-label">Nome</label>
              <input type="text" id="pet-name" class="form-control" required />
            </div>

            <div class="mb-3">
              <label for="pet-species" class="form-label">Espécie</label>
              <input type="text" id="pet-species" class="form-control" placeholder="Ex: cachorro, gato, pássaro" required />
            </div>

            <div class="mb-3">
              <label for="pet-breed" class="form-label">Raça</label>
              <input type="text" id="pet-breed" class="form-control" required />
            </div>

            <div class="mb-3">
              <label for="pet-age" class="form-label">Idade (anos)</label>
              <input type="number" id="pet-age" class="form-control" min="0" required />
            </div>

            <div class="d-flex gap-2 flex-wrap">
              <button type="submit" class="btn btn-primary">Salvar</button>
              <button type="button" id="pet-cancel-edit" class="btn btn-secondary hidden">Cancelar edição</button>
            </div>
          </form>

          <p id="pet-message" class="mt-3 mb-0"></p>
        </div>
      </section>

      <section class="card shadow-sm">
        <div class="card-body">
          <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
            <h2 class="h4 mb-0">Meus Pets</h2>
            <button id="pet-reload-btn" class="btn btn-outline-secondary btn-auto">Atualizar</button>
          </div>

          <div id="pets-list"></div>
        </div>
      </section>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
